name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pragma ${{ github.ref_name }}"
          releaseBody: |
            Pragma ${{ github.ref_name }} is the first public release of the IDE.

            ## Installation

            - **Windows**: download and run `pragma_*_x64-setup.exe` or `pragma_*_x64_en-US.msi`
            - **macOS**: download `pragma_*_universal.dmg`, open it and drag Pragma to Applications
            - **Linux**: download `pragma_*_amd64.deb`, `pragma_*-1.x86_64.rpm` or `pragma_*_amd64.AppImage`

            > **Note:** This release is not code-signed. Windows may show a SmartScreen warning and macOS may require you to right-click the app and choose **Open** on first launch. The macOS build is compiled automatically in CI but has not been tested on Apple hardware.

            See the full changelog in [CHANGELOG.md](https://github.com/NiklasTech/pragma/blob/main/CHANGELOG.md).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
